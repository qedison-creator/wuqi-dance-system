<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双瑗文化艺术（深圳）有限公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 48px 32px;
            text-align: center;
        }
        .company-name {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 0 auto 24px;
            border-radius: 2px;
        }
        .description {
            font-size: 16px;
            color: #5a6c7d;
            line-height: 1.8;
            margin-bottom: 32px;
        }
        .icp-info {
            font-size: 14px;
            color: #8a9ba8;
            padding-top: 24px;
            border-top: 1px solid #e8ecf0;
        }
        .icp-link {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .icp-link:hover {
            color: #764ba2;
        }
        @media (max-width: 480px) {
            .container {
                padding: 32px 20px;
            }
            .company-name {
                font-size: 20px;
            }
            .description {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="company-name">双瑗文化艺术（深圳）有限公司</div>
        <div class="divider"></div>
        <div class="description">
            本域名仅作为我司微信小程序后端接口域名，<br>
            无对外展示的网页站点。
        </div>
        <div class="icp-info">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="icp-link">
                粤ICP备2026067180号-3
            </a>
        </div>
    </div>
</body>
</html>
